<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#E8611A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="CityPulse" />
    <link rel="apple-touch-icon" href="/CityPulse_Logo1_Fun.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>CityPulse Tempe</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Onboarding Modal -->
    <div id="cp-onboard-backdrop" style="display:none;position:fixed;inset:0;z-index:10000;background:rgba(15,26,19,.65);backdrop-filter:blur(4px);align-items:center;justify-content:center">
      <div id="cp-onboard-modal" style="width:min(460px,92vw);max-height:92vh;border-radius:20px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.35);animation:cp-ob-in .25s ease-out">
        <!-- Header -->
        <div id="cp-ob-header" style="background:#0F1A13;padding:28px 28px 24px;text-align:center">
          <svg width="36" height="36" viewBox="0 0 100 100" style="margin-bottom:12px"><circle cx="50" cy="50" r="46" fill="none" stroke="#CC6633" stroke-width="6"/><circle cx="50" cy="50" r="8" fill="#CC6633"/><path d="M50 18v24M50 58v24M18 50h24M58 50h24" stroke="#CC6633" stroke-width="5" stroke-linecap="round"/></svg>
          <div id="cp-ob-step-label" style="font-family:system-ui,sans-serif;font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#8FA89A;margin-bottom:6px"></div>
          <div id="cp-ob-dots" style="display:flex;gap:6px;justify-content:center;margin-bottom:14px"></div>
          <div id="cp-ob-title" style="font-family:system-ui,sans-serif;font-size:22px;font-weight:800;color:#fff;line-height:1.2;letter-spacing:-.01em"></div>
        </div>
        <!-- Body -->
        <div style="background:#fff;padding:28px 28px 20px">
          <div id="cp-ob-visual" style="display:flex;justify-content:center;margin-bottom:20px"></div>
          <div id="cp-ob-body" style="font-family:system-ui,sans-serif;font-size:14.5px;line-height:1.7;color:#2A2A2A;margin-bottom:16px"></div>
          <div id="cp-ob-tip" style="background:rgba(204,102,51,.08);border-left:3px solid #CC6633;border-radius:0 10px 10px 0;padding:12px 16px;font-family:system-ui,sans-serif;font-size:13px;line-height:1.6;color:#6B4A2E"></div>
        </div>
        <!-- Footer -->
        <div style="background:#fff;padding:0 28px 24px;display:flex;align-items:center;justify-content:space-between">
          <span id="cp-ob-skip" style="font-family:system-ui,sans-serif;font-size:13px;color:#8FA89A;cursor:pointer;padding:8px 4px">Skip tour</span>
          <button id="cp-ob-next" style="font-family:system-ui,sans-serif;font-size:14px;font-weight:700;color:#fff;background:#CC6633;border:none;border-radius:12px;padding:12px 32px;cursor:pointer">Next</button>
        </div>
      </div>
    </div>
    <style>
      @keyframes cp-ob-in{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
    </style>
    <script>
    (function(){
      // Onboarding modal disabled for Tempe fork
      return;
      var steps=[
        {
          label:'Step 1 of 3',
          title:'Every building in Tempe has a story',
          visual:'<svg width="200" height="120" viewBox="0 0 200 120"><rect x="20" y="30" width="50" height="70" rx="4" fill="#EEF1EE" stroke="#0F1A13" stroke-width="2"/><rect x="75" y="50" width="50" height="50" rx="4" fill="#EEF1EE" stroke="#0F1A13" stroke-width="2"/><rect x="130" y="20" width="50" height="80" rx="4" fill="#EEF1EE" stroke="#0F1A13" stroke-width="2"/><text x="45" y="75" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="700" fill="#CC6633">3709-014</text><text x="100" y="82" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="700" fill="#CC6633">0263-011</text><text x="155" y="68" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="700" fill="#CC6633">3716-025</text><path d="M45 100 L45 112" stroke="#CC6633" stroke-width="2" stroke-dasharray="3,3"/><path d="M100 100 L100 112" stroke="#CC6633" stroke-width="2" stroke-dasharray="3,3"/><path d="M155 100 L155 112" stroke="#CC6633" stroke-width="2" stroke-dasharray="3,3"/><rect x="10" y="110" width="180" height="8" rx="2" fill="rgba(204,102,51,.12)"/><text x="100" y="10" text-anchor="middle" font-family="system-ui" font-size="8" fill="#8FA89A">PERMITS + EVICTIONS + 311 + PLANNING</text></svg>',
          body:'CityPulse connects every parcel in Tempe to live civic data using the <strong>APN (Assessor Parcel Number)</strong> as a universal join key. Permits, code cases, and planning decisions are all linked to the building they affect.',
          tip:'<strong>Try it:</strong> Click any building on the map to see its full civic profile — permits filed, estimated value, and development status.'
        },
        {
          label:'Step 2 of 3',
          title:'Generate your intelligence briefing',
          visual:'<svg width="260" height="150" viewBox="0 0 260 150"><text x="130" y="14" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="600" fill="#8FA89A" letter-spacing=".5">1. SELECT A DISTRICT</text><rect x="40" y="22" width="44" height="30" rx="15" fill="#CC6633"/><text x="62" y="42" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="700" fill="#fff">D3</text><rect x="90" y="22" width="44" height="30" rx="15" fill="#EEF1EE" stroke="#CCC" stroke-width="1"/><text x="112" y="42" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#4A5E52">D5</text><rect x="140" y="22" width="44" height="30" rx="15" fill="#EEF1EE" stroke="#CCC" stroke-width="1"/><text x="162" y="42" text-anchor="middle" font-family="system-ui" font-size="11" font-weight="600" fill="#4A5E52">D6</text><text x="130" y="72" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="600" fill="#8FA89A" letter-spacing=".5">2. SCROLL DOWN &amp; TAP</text><path d="M130 56 L130 64" stroke="#CC6633" stroke-width="2" marker-end="url(#arr)"/><defs><marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#CC6633"/></marker></defs><rect x="55" y="80" width="150" height="40" rx="20" fill="#CC6633"/><text x="130" y="105" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="800" fill="#fff">Generate Briefing</text><text x="130" y="140" text-anchor="middle" font-family="system-ui" font-size="9" font-weight="600" fill="#8FA89A" letter-spacing=".5">3. WAIT ~30s FOR CLAUDE AI</text></svg>',
          body:'This is the key step. After selecting a district at the top, <strong>scroll down the page</strong> and click the orange <strong>Generate Briefing</strong> button. Claude AI will analyze live permit and planning data for your area and write a full intelligence report. It takes about 30 seconds.',
          tip:'<strong>Important:</strong> The briefing won\'t generate automatically — you must click the button. Once it\'s ready, you\'ll see permit activity, development pipeline, community sentiment, and the AI\'s top signal for your district.'
        },
        {
          label:'Step 3 of 3',
          title:'Explore your briefing',
          visual:'<svg width="220" height="100" viewBox="0 0 220 100"><rect x="0" y="0" width="220" height="100" rx="12" fill="#EEF1EE"/><rect x="12" y="12" width="130" height="10" rx="3" fill="#0F1A13"/><rect x="12" y="28" width="196" height="6" rx="2" fill="#CCC"/><rect x="12" y="38" width="180" height="6" rx="2" fill="#CCC"/><rect x="12" y="48" width="160" height="6" rx="2" fill="#CCC"/><rect x="12" y="64" width="196" height="28" rx="8" fill="rgba(204,102,51,.12)" stroke="#CC6633" stroke-width="1.5"/><text x="22" y="76" font-family="system-ui" font-size="8" font-weight="700" fill="#CC6633">TOP SIGNAL</text><rect x="22" y="80" width="140" height="5" rx="2" fill="rgba(204,102,51,.25)"/></svg>',
          body:'Your AI briefing covers permit activity, development pipeline, eviction trends, and community sentiment. Use the tabs at the bottom to explore <strong>Charts</strong>, <strong>Signals</strong>, and the interactive <strong>Map</strong> — all scoped to your district.',
          tip:'<strong>Look for:</strong> The orange <strong>Top Signal</strong> card highlights the single most important trend the AI found in your district\'s data.'
        }
      ];
      var current=0;
      var backdrop=document.getElementById('cp-onboard-backdrop');
      var stepLabel=document.getElementById('cp-ob-step-label');
      var dots=document.getElementById('cp-ob-dots');
      var title=document.getElementById('cp-ob-title');
      var visual=document.getElementById('cp-ob-visual');
      var body=document.getElementById('cp-ob-body');
      var tip=document.getElementById('cp-ob-tip');
      var nextBtn=document.getElementById('cp-ob-next');
      var skipBtn=document.getElementById('cp-ob-skip');

      function render(){
        var s=steps[current];
        stepLabel.textContent=s.label;
        title.textContent=s.title;
        visual.innerHTML=s.visual;
        body.innerHTML=s.body;
        tip.innerHTML=s.tip;
        dots.innerHTML='';
        for(var i=0;i<steps.length;i++){
          var d=document.createElement('div');
          d.style.cssText='width:'+(i===current?'20px':'8px')+';height:8px;border-radius:4px;background:'+(i===current?'#CC6633':'#4A5E52')+';transition:all .2s';
          dots.appendChild(d);
        }
        nextBtn.textContent=current===steps.length-1?'Get started':'Next';
      }

      function dismiss(){
        localStorage.setItem('cp_onboarded','1');
        backdrop.style.display='none';
      }

      nextBtn.addEventListener('click',function(){
        if(current<steps.length-1){current++;render();}
        else dismiss();
      });
      skipBtn.addEventListener('click',dismiss);
      backdrop.addEventListener('click',function(e){
        if(e.target===backdrop)dismiss();
      });

      render();
      setTimeout(function(){backdrop.style.display='flex';},6000);
    })();
    </script>
  </body>
</html>
